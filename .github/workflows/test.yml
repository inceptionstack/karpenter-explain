name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: syntax check
        run: python -m py_compile kexplain
      - name: unit tests
        run: python -m unittest discover tests -v
      - name: style gates
        run: |
          # repo rule: no em-dashes anywhere
          ! grep -rn "—" $(git ls-files)
